name: Reusable - Deploy (Azure Terraform)

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub Environment name (dev | test | prod)"
        required: true
        type: string
      infra_path:
        description: "Relative path to the Terraform root"
        required: true
        type: string
      tf_state_key:
        description: "Terraform backend state file key"
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

jobs:
  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Azure Login (OIDC)
        uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474  # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2

      - name: Terraform init
        working-directory: ${{ inputs.infra_path }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=${{ inputs.tf_state_key }}"

      - name: Terraform apply
        working-directory: ${{ inputs.infra_path }}
        run: terraform apply -auto-approve

      - name: Capture Terraform outputs
        if: always()
        working-directory: ${{ inputs.infra_path }}
        run: |
          mkdir -p ../../../reports
          terraform output -json \
            > ../../../reports/deploy-${{ inputs.environment }}-output.json 2>/dev/null \
            || echo "{}" > ../../../reports/deploy-${{ inputs.environment }}-output.json

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1  # v4.6.1
        with:
          name: deploy-evidence-${{ inputs.environment }}-${{ github.run_id }}
          path: reports/deploy-${{ inputs.environment }}-output.json
          if-no-files-found: warn
